name: Build QunarNewDevice

on:
  push:
    branches: [master]
    paths-ignore:
      - 'dist/**'
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          ln -sf "$XCODE_SDK" $THEOS/sdks/iPhoneOS16.5.sdk

      - name: Build tweak deb (arm64 + arm64e)
        run: make -C Reverse/output/tweak package FINALPACKAGE=1

      - name: Verify tweak architectures
        continue-on-error: true
        run: |
          DEB=$(ls Reverse/output/tweak/packages/*.deb | tail -1)
          mkdir -p /tmp/debcheck
          cp "$DEB" /tmp/debcheck/tweak.deb
          cd /tmp/debcheck && ar x tweak.deb || true
          tar xf data.tar* --wildcards '*.dylib' -C /tmp/debcheck 2>/dev/null || true
          DYLIB=$(find /tmp/debcheck -name "*.dylib" | head -1)
          [ -n "$DYLIB" ] && echo "=== architectures ===" && lipo -archs "$DYLIB" || echo "verify skipped"

      - name: Build app IPA (arm64 + arm64e)
        run: |
          make -C ios_app_oc package FINALPACKAGE=1
          DEB=$(ls ios_app_oc/packages/*.deb | tail -1)
          mkdir -p /tmp/appcheck
          cp "$DEB" /tmp/appcheck/app.deb
          cd /tmp/appcheck && ar x app.deb
          tar xf data.tar* -C /tmp/appcheck 2>/dev/null || true
          APP=$(find /tmp/appcheck -name "YiJianXinJi.app" -type d | head -1)
          if [ -n "$APP" ]; then
            mkdir -p /tmp/appcheck/Payload
            cp -r "$APP" /tmp/appcheck/Payload/
            cd /tmp/appcheck && zip -r YiJianXinJi.ipa Payload/
            echo "IPA_PATH=/tmp/appcheck/YiJianXinJi.ipa" >> $GITHUB_ENV
          fi

      - name: Copy to dist/ with version number
        run: |
          mkdir -p dist
          LAST=$(ls dist/tweak_v*.deb 2>/dev/null | sed 's/.*tweak_v\([0-9]*\)\.deb/\1/' | sort -n | tail -1)
          NEXT=$((${LAST:-0} + 1))
          echo "NEXT_V=$NEXT" >> $GITHUB_ENV
          DEB=$(ls Reverse/output/tweak/packages/*.deb | tail -1)
          cp "$DEB" "dist/tweak_v${NEXT}.deb"
          [ -f "$IPA_PATH" ] && cp "$IPA_PATH" "dist/app_v${NEXT}.ipa" || true
          echo "dist/tweak_v${NEXT}.deb"

      - name: Commit back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "build: v${{ env.NEXT_V }} arm64+arm64e [skip ci]"
          git push
